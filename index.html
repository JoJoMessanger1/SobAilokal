<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SobAi - Deine eigene KI</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        #chat-container { width: 95%; max-width: 600px; background: #1e293b; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); padding: 20px; }
        h1 { color: #38bdf8; text-align: center; margin-bottom: 10px; font-size: 24px; }
        #status { font-size: 12px; color: #94a3b8; text-align: center; margin-bottom: 20px; min-height: 15px; }
        #log { height: 350px; overflow-y: auto; background: #0f172a; border-radius: 10px; padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #334155; }
        .input-group { display: flex; gap: 10px; }
        input { flex: 1; border: none; background: #334155; color: white; padding: 12px 15px; border-radius: 10px; outline: none; }
        button { background: #38bdf8; color: #0f172a; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #475569; cursor: not-allowed; }
        .user-msg { align-self: flex-end; background: #0284c7; color: white; padding: 8px 12px; border-radius: 12px 12px 0 12px; max-width: 80%; }
        .ai-msg { align-self: flex-start; background: #334155; color: white; padding: 8px 12px; border-radius: 12px 12px 12px 0; max-width: 80%; line-height: 1.4; }
    </style>
</head>
<body>

    <div id="chat-container">
        <h1>SobAi</h1>
        <div id="status">Warte auf Initialisierung...</div>
        <div id="log"></div>
        <div class="input-group">
            <input type="text" id="user-input" placeholder="Schreib SobAi etwas..." disabled>
            <button id="send-btn" disabled>Senden</button>
        </div>
    </div>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        // Wir nutzen das stabile Original-Repo, um XET-Fehler zu vermeiden
        const MODEL_URL = "https://huggingface.co/mlc-ai/Llama-3.2-1B-Instruct-q4f16_1-MLC/resolve/main/";
        const AI_NAME = "SobAi";

        const statusLabel = document.getElementById("status");
        const log = document.getElementById("log");
        const input = document.getElementById("user-input");
        const btn = document.getElementById("send-btn");

        const appConfig = {
            "model_list": [{
                "model_url": MODEL_URL,
                "local_id": "Llama-3.2-1B-Instruct-q4f16_1-MLC",
                "model_lib_url": "https://raw.githubusercontent.com/mlc-ai/binary-mlc-llm-libs/main/web-llm-models/v0_2_48/Llama-3.2-1B-Instruct-q4f16_1-ctx4k_bundle.wasm"
            }]
        };

        let engine;

        async function init() {
            try {
                // Wir erstellen die KI-Engine
                engine = await webllm.CreateEngine("Llama-3.2-1B-Instruct-q4f16_1-MLC", {
                    appConfig: appConfig,
                    initProgressCallback: (report) => {
                        statusLabel.innerText = "Lade SobAi-Gehirn: " + Math.round(report.progress * 100) + "%";
                        if (report.progress === 1) {
                            statusLabel.innerText = "SobAi ist bereit! (Läuft lokal auf deiner GPU)";
                            input.disabled = false;
                            btn.disabled = false;
                        }
                    }
                });
            } catch (err) {
                statusLabel.innerText = "Fehler: WebGPU nicht aktiv oder Browser inkompatibel.";
                console.error(err);
            }
        }

        async function handleSend() {
            const text = input.value.trim();
            if (!text) return;

            input.value = "";
            log.innerHTML += `<div class="user-msg">${text}</div>`;
            log.scrollTop = log.scrollHeight;

            const messages = [
                { role: "system", content: `Du bist ${AI_NAME}, eine hilfreiche und coole KI, erstellt von Johann.` },
                { role: "user", content: text }
            ];

            // KI generiert Antwort
            const chunks = await engine.chat.completions.create({ messages });
            const reply = chunks.choices[0].message.content;

            log.innerHTML += `<div class="ai-msg">${reply}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        btn.onclick = handleSend;
        input.onkeypress = (e) => { if (e.key === "Enter") handleSend(); };

        // Starten
        init();
    </script>
</body>
</html>
