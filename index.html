<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SobAi - Meine eigene KI</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: white; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        #chat-container { width: 100%; max-width: 600px; background: #1e293b; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); padding: 25px; margin-top: 20px; }
        h2 { margin-top: 0; color: #38bdf8; text-align: center; }
        #log { height: 400px; overflow-y: auto; border-bottom: 1px solid #334155; margin-bottom: 20px; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        #status { font-size: 13px; color: #94a3b8; margin-bottom: 15px; text-align: center; font-style: italic; }
        .input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px 20px; border: 1px solid #334155; background: #0f172a; color: white; border-radius: 25px; outline: none; }
        button { padding: 12px 25px; border: none; background: #38bdf8; color: #0f172a; font-weight: bold; border-radius: 25px; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #7dd3fc; }
        button:disabled { background: #475569; cursor: not-allowed; }
        .user-msg { align-self: flex-end; background: #38bdf8; color: #0f172a; padding: 10px 15px; border-radius: 15px 15px 0 15px; max-width: 80%; }
        .ai-msg { align-self: flex-start; background: #334155; color: white; padding: 10px 15px; border-radius: 15px 15px 15px 0; max-width: 80%; }
    </style>
</head>
<body>

    <div id="chat-container">
        <h2>SobAi</h2>
        <div id="status">Warte auf Initialisierung...</div>
        <div id="log"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Frag SobAi etwas..." disabled>
            <button id="send-btn" disabled>Senden</button>
        </div>
    </div>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        // DEIN EIGENER MODELL-LINK (RICHTIG FORMATIERT)
        const MY_MODEL_URL = "https://huggingface.co/Johann13241/SobAi/resolve/main/";
        const AI_NAME = "SobAi";

        const logElement = document.getElementById("log");
        const statusElement = document.getElementById("status");
        const inputElement = document.getElementById("user-input");
        const btnElement = document.getElementById("send-btn");

        const appConfig = {
            "model_list": [{
                "model_url": MY_MODEL_URL,
                "local_id": "SobAi-Model",
                "model_lib_url": "https://raw.githubusercontent.com/mlc-ai/binary-mlc-llm-libs/main/web-llm-models/v0_2_48/Llama-3.2-1B-Instruct-q4f16_1-ctx4k_bundle.wasm"
            }]
        };

        let engine;

        async function init() {
            try {
                engine = await webllm.CreateEngine("SobAi-Model", {
                    appConfig: appConfig,
                    initProgressCallback: (report) => {
                        statusElement.innerText = "Modell wird geladen: " + Math.round(report.progress * 100) + "% (Bitte warten...)";
                    }
                });
                statusElement.innerText = "SobAi ist bereit! Alles läuft lokal auf deiner Grafikkarte.";
                inputElement.disabled = false;
                btnElement.disabled = false;
            } catch (e) {
                statusElement.innerText = "Fehler: WebGPU wird nicht unterstützt oder Link falsch.";
                console.error(e);
            }
        }

        async function sendMessage() {
            const prompt = inputElement.value;
            if (!prompt) return;

            inputElement.value = "";
            logElement.innerHTML += `<div class="user-msg">${prompt}</div>`;
            logElement.scrollTop = logElement.scrollHeight;

            const messages = [
                { role: "system", content: `Du bist ${AI_NAME}, eine hilfreiche KI, entwickelt von Johann.` },
                { role: "user", content: prompt }
            ];

            const reply = await engine.chat.completions.create({ messages });
            const response = reply.choices[0].message.content;

            logElement.innerHTML += `<div class="ai-msg">${response}</div>`;
            logElement.scrollTop = logElement.scrollHeight;
        }

        btnElement.onclick = sendMessage;
        inputElement.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        init();
    </script>
</body>
</html>
